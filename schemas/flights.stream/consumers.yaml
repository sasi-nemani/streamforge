# StreamForge Consumer Registry — flights.stream
# ────────────────────────────────────────────────
# Flight events drive real-time airport operations — gate assignments, boarding,
# crew scheduling. Blast radius for field drift is extremely high.
#
# Run `streamforge consumers events/flights/stream` to view.

stream: flights.stream

consumers:

  - name: flight-status-api
    team: airport-operations
    contact: "slack:#ops-oncall | pagerduty:ops-critical-pd"
    criticality: tier1
    schema_version: "1.0.0"
    description: >
      Real-time flight status API consumed by airport display boards, mobile apps,
      and third-party travel aggregators (Kayak, Google Flights). Reads flight_number,
      status, departure_time, gate. If status field drifts (enum change or removal),
      boards go blank. Downstream: ~50k passengers per hour at major hubs.
    runbook: "https://wiki.internal/runbooks/flight-status-blank-boards"
    fields_used:
      - path: flight_number
        required: true
        transform: null
      - path: event_type
        required: true
        transform: null
      - path: status
        required: true
        transform: null
      - path: departure_airport
        required: true
        transform: null
      - path: arrival_airport
        required: true
        transform: null
      - path: departure_time
        required: true
        transform: "parse_timestamp(value)"
      - path: arrival_time
        required: false
        transform: "parse_timestamp(value)"
      - path: gate
        required: false
        transform: null

  - name: boarding-pass-service
    team: passenger-experience
    contact: "slack:#pax-eng | pagerduty:pax-pd"
    criticality: tier1
    schema_version: "1.0.0"
    description: >
      Generates and validates boarding passes at gate scanners. Reads flight_number,
      gate, departure_time. A gate field change (renamed or missing) breaks scanner
      validation — passengers can't board. SLA: must be restored within 15 minutes
      or airport authority escalates.
    runbook: "https://wiki.internal/runbooks/boarding-scanner-gate-mismatch"
    fields_used:
      - path: flight_number
        required: true
        transform: null
      - path: departure_airport
        required: true
        transform: null
      - path: arrival_airport
        required: true
        transform: null
      - path: departure_time
        required: true
        transform: null
      - path: gate
        required: true
        transform: null
      - path: status
        required: true
        transform: null

  - name: crew-scheduling-system
    team: crew-operations
    contact: "slack:#crew-ops | email:crew-scheduling@airline.com"
    criticality: tier2
    schema_version: "1.0.0"
    description: >
      Assigns cabin crew to flights based on departure_time, departure_airport,
      and flight_number. Drift in time formats causes scheduling mismatches —
      crew assigned to wrong shifts. Impact: FAA duty-time violations if undetected.
    runbook: "https://wiki.internal/runbooks/crew-duty-time-violation"
    fields_used:
      - path: flight_number
        required: true
        transform: null
      - path: event_type
        required: true
        transform: null
      - path: departure_airport
        required: true
        transform: null
      - path: departure_time
        required: true
        transform: "parse_timestamp(value)"
      - path: arrival_time
        required: false
        transform: "parse_timestamp(value)"
      - path: aircraft_type
        required: false
        transform: null

  - name: flight-analytics-warehouse
    team: data-science
    contact: "slack:#data-science | email:ds@airline.com"
    criticality: tier3
    schema_version: "1.0.0"
    description: >
      Historical flight data for delay prediction models and route optimization.
      Reads all fields. Schema drift causes model feature drift — detected in
      next training cycle (weekly). Low urgency but high long-term cost.
    fields_used:
      - path: flight_number
        required: true
        transform: null
      - path: status
        required: true
        transform: null
      - path: departure_time
        required: true
        transform: null
      - path: arrival_time
        required: false
        transform: null
      - path: departure_airport
        required: true
        transform: null
      - path: arrival_airport
        required: true
        transform: null
      - path: gate
        required: false
        transform: null
