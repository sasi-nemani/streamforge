# StreamForge Consumer Registry — live (Live Tap Stream)
# ────────────────────────────────────────────────────────
# Live tap streams from external data sources (Coinbase WebSocket, Wikipedia SSE).
# Used for demos and integration testing. Lower criticality — demo/dev environment.
#
# Run `streamforge consumers events/live` to view.

stream: live

consumers:

  - name: realtime-dashboard
    team: platform-eng
    contact: "slack:#platform-demo"
    criticality: tier2
    schema_version: "1.0.0"
    description: >
      Powers the StreamForge live demo dashboard. Reads event fields to render
      the real-time schema inference panel. Schema drift causes display anomalies
      but no production impact — demo environment only.
    fields_used:
      - path: type
        required: false
        transform: null
      - path: event_type
        required: false
        transform: null
      - path: sequence
        required: false
        transform: null
      - path: time
        required: false
        transform: "parse_timestamp(value)"
      - path: product_id
        required: false
        transform: null
      - path: price
        required: false
        transform: null
      - path: side
        required: false
        transform: null

  - name: schema-drift-simulator
    team: platform-eng
    contact: "slack:#platform-demo"
    criticality: tier3
    schema_version: "1.0.0"
    description: >
      Intentionally monitors live tap for schema drift to demonstrate the detection
      system during investor/customer demos. All drift is expected and logged.
    fields_used:
      - path: type
        required: false
        transform: null
      - path: time
        required: false
        transform: null
