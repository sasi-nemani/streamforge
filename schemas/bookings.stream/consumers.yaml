# StreamForge Consumer Registry — bookings.stream
# ─────────────────────────────────────────────────
# Booking events include PII (passport numbers, names, contact details).
# Blast radius for field drift is high — 3 downstream systems depend on this stream.
#
# Run `streamforge consumers events/bookings/stream` to view.

stream: bookings.stream

consumers:

  - name: booking-engine-core
    team: reservations-platform
    contact: "slack:#reservations-oncall | pagerduty:reservations-pd"
    criticality: tier1
    schema_version: "1.0.0"
    description: >
      Processes all booking confirmations and generates PNRs (Passenger Name Records).
      Reads passenger name, passport_number, and flight details. A missing passenger
      field causes the booking to fail at confirmation — customer-facing outage.
    runbook: "https://wiki.internal/runbooks/booking-engine-pnr-failure"
    fields_used:
      - path: booking_id
        required: true
        transform: null
      - path: event_type
        required: true
        transform: null
      - path: passenger_name
        required: true
        transform: null
      - path: passport_number
        required: true
        transform: "mask_pii(value, show_last=4)"
      - path: flight_number
        required: true
        transform: null
      - path: departure_airport
        required: true
        transform: null
      - path: arrival_airport
        required: true
        transform: null
      - path: booking_date
        required: true
        transform: "parse_date(value)"
      - path: status
        required: true
        transform: null

  - name: notification-service
    team: customer-experience
    contact: "slack:#cx-eng | email:cx-eng@company.com"
    criticality: tier2
    schema_version: "1.0.0"
    description: >
      Sends booking confirmation emails and SMS using contact_email and contact_phone.
      If contact fields drift (renamed or removed), customers don't receive confirmations.
      Impact: customer support volume spikes within 30 minutes.
    runbook: "https://wiki.internal/runbooks/notification-silent-failure"
    fields_used:
      - path: booking_id
        required: true
        transform: null
      - path: event_type
        required: true
        transform: null
      - path: passenger_name
        required: true
        transform: null
      - path: contact_email
        required: true
        transform: null
      - path: contact_phone
        required: false
        transform: null
      - path: flight_number
        required: true
        transform: null
      - path: departure_airport
        required: false
        transform: null
      - path: arrival_airport
        required: false
        transform: null
      - path: status
        required: true
        transform: null

  - name: gdpr-data-subject-registry
    team: privacy-engineering
    contact: "slack:#privacy-eng | email:privacy@company.com"
    criticality: tier1
    schema_version: "1.0.0"
    description: >
      Maintains a registry of all PII collected per data subject for GDPR Article 30
      compliance. Must track passport_number, contact_email, and passenger_name.
      A schema drift that renames or removes these fields breaks the audit trail —
      a GDPR compliance violation with up to 4% global revenue fine.
    runbook: "https://wiki.internal/runbooks/gdpr-registry-gap"
    fields_used:
      - path: booking_id
        required: true
        transform: null
      - path: passenger_name
        required: true
        transform: null
      - path: passport_number
        required: true
        transform: null
      - path: contact_email
        required: true
        transform: "hash_sha256(value)"
      - path: contact_phone
        required: false
        transform: "hash_sha256(value)"
      - path: booking_date
        required: true
        transform: null

  - name: revenue-analytics
    team: finance-data
    contact: "slack:#finance-data | email:finance-analytics@company.com"
    criticality: tier3
    schema_version: "1.0.0"
    description: >
      Aggregates booking revenue for finance reporting. Reads price, currency, status.
      Impact: delayed financial reports (next business day). Not real-time.
    fields_used:
      - path: booking_id
        required: true
        transform: null
      - path: price
        required: true
        transform: null
      - path: currency
        required: false
        transform: null
      - path: status
        required: true
        transform: null
      - path: booking_date
        required: false
        transform: null
