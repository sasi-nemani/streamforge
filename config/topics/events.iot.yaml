# StreamForge — Topic Config: events.iot
# ========================================
# IoT sensor events — high volume, accept noisier data.

watch:
  interval_seconds: 120
  sample_size: 500
  window_capacity: 5000
  alert_tier: 2
  actions:
    tier_1: log
    tier_2: alert
    tier_3: block

stability:
  # IoT has 6 sensor sub-types with different schemas — new sub-types are
  # schema evolution (Tier-1), not breaking drift. Without this, stabilization
  # never completes because each window rotation introduces a new sensor cluster.
  new_cluster_is_evolution: true
  stability_cycles: 3
  warmup_cycles: 10
  consecutive_drift_threshold: 2

drift:
  # IoT data is messier — wider tolerances
  type_change_threshold: 0.10
  presence_drop_threshold: 0.25   # sensors go offline regularly
  min_sample_for_stats: 50
